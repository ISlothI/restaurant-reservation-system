<div class="max-w-md mx-auto mt-10">
  <h1 class="text-2xl font-bold mb-6 text-center">Regisztráció</h1>
  <form (ngSubmit)="onSubmit()" class="bg-white shadow rounded-lg p-6 space-y-4">
    <div *ngIf="error" class="bg-red-100 text-red-700 p-3 rounded text-sm">{{ error }}</div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Teljes név</label>
      <input type="text" [(ngModel)]="fullName" name="fullName" required
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
      <input type="email" [(ngModel)]="email" name="email" required
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Jelszó</label>
      <input type="password" [(ngModel)]="password" name="password" required minlength="6"
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Telefonszám</label>
      <input type="tel" [(ngModel)]="phone" name="phone"
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Szerepkör</label>
      <select [(ngModel)]="role" name="role"
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="guest">Vendég</option>
        <option value="admin">Étteremvezető</option>
      </select>
    </div>
    <button type="submit" [disabled]="loading"
      class="w-full bg-indigo-600 text-white py-2 rounded font-semibold hover:bg-indigo-700 disabled:opacity-50">
      {{ loading ? 'Regisztráció...' : 'Regisztráció' }}
    </button>
    <p class="text-sm text-center text-gray-600">
      Már van fiókod? <a routerLink="/login" class="text-indigo-600 hover:underline">Bejelentkezés</a>
    </p>
  </form>
</div>
