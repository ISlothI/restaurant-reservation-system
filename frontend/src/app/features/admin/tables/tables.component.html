<h1 class="text-2xl font-bold mb-6">Asztalok kezelése</h1>
<div *ngIf="loading" class="text-gray-500">Betöltés...</div>
<div *ngIf="!loading && !restaurant" class="text-gray-500">Először hozd létre az éttermedet a Vezérlőpulton.</div>

<div *ngIf="!loading && restaurant">
  <button (click)="openCreate()" class="mb-4 bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">
    + Új asztal
  </button>

  <!-- Form -->
  <div *ngIf="showForm" class="bg-white shadow rounded-lg p-5 mb-6">
    <h2 class="font-semibold mb-3">{{ editingId ? 'Asztal szerkesztése' : 'Új asztal' }}</h2>
    <div *ngIf="error" class="bg-red-100 text-red-700 p-2 rounded text-sm mb-3">{{ error }}</div>
    <form (ngSubmit)="save()" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Név</label>
        <input type="text" [(ngModel)]="form.name" name="name" required
          class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Kapacitás</label>
        <input type="number" [(ngModel)]="form.capacity" name="capacity" min="1" max="50" required
          class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Típus</label>
        <select [(ngModel)]="form.table_type" name="table_type"
          class="w-full border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-indigo-500">
          <option value="indoor">Belső</option>
          <option value="outdoor">Terasz</option>
          <option value="window">Ablak melletti</option>
        </select>
      </div>
      <div class="flex items-end gap-3">
        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Mentés</button>
        <button type="button" (click)="showForm = false" class="bg-gray-200 text-gray-700 px-4 py-2 rounded hover:bg-gray-300">Mégse</button>
      </div>
    </form>
  </div>

  <!-- Table list -->
  <div *ngIf="tables.length === 0 && !showForm" class="text-gray-400">Még nincs asztal.</div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
    <div *ngFor="let t of tables" class="bg-white shadow rounded p-4 flex justify-between items-start">
      <div>
        <p class="font-semibold">{{ t.name }}</p>
        <p class="text-sm text-gray-600">{{ typeLabel(t.table_type) }} · {{ t.capacity }} fő</p>
        <p class="text-xs" [ngClass]="t.is_active ? 'text-green-600' : 'text-red-500'">{{ t.is_active ? 'Aktív' : 'Inaktív' }}</p>
      </div>
      <div class="flex gap-2">
        <button (click)="openEdit(t)" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded hover:bg-indigo-200">Szerkesztés</button>
        <button (click)="remove(t.id)" class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded hover:bg-red-200">Törlés</button>
      </div>
    </div>
  </div>
</div>
