<div class="max-w-md mx-auto mt-10">
  <h1 class="text-2xl font-bold mb-6 text-center">Profil szerkesztése</h1>
  <form (ngSubmit)="save()" class="bg-white shadow rounded-lg p-6 space-y-4">
    <div *ngIf="error" class="bg-red-100 text-red-700 p-3 rounded text-sm">{{ error }}</div>
    <div *ngIf="success" class="bg-green-100 text-green-700 p-3 rounded text-sm">{{ success }}</div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Teljes név</label>
      <input type="text" [(ngModel)]="form.full_name" name="full_name" required
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
      <input type="email" [(ngModel)]="form.email" name="email" required
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Telefonszám</label>
      <input type="tel" [(ngModel)]="form.phone" name="phone"
        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <button type="submit" [disabled]="loading"
      class="w-full bg-indigo-600 text-white py-2 rounded font-semibold hover:bg-indigo-700 disabled:opacity-50">
      {{ loading ? 'Mentés...' : 'Mentés' }}
    </button>
  </form>
</div>
